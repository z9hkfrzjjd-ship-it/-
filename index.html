<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>   عيدية مامي 💕  </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF7000; --bg: #111111; --text: #EEEEEE; --card-bg: rgba(255,255,255,0.05); }
        .light-theme { --bg: #f5f5f5; --text: #222222; --card-bg: rgba(0,0,0,0.05); }
        
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); transition: 0.5s; text-align: right; }
        
        .theme-toggle { position: fixed; top: 10px; left: 10px; z-index: 100; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; }
        
        .container { display: flex; flex-wrap: wrap; padding: 20px; min-height: 100vh; align-items: center; justify-content: center; }
        
        .info { flex: 1; min-width: 300px; padding: 20px; }
        .info h1 { color: var(--primary); font-size: 2.5rem; }

        .game-box { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        canvas { background: #000; border: 5px solid var(--primary); border-radius: 15px; max-width: 100%; }

        /* أزرار التحكم الخاصة بالسوني */
        .controls { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px); gap: 10px; margin-top: 20px; }
        .control-btn { background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg); border: 4px solid var(--primary); padding: 30px; border-radius: 20px; z-index: 1000; text-align: center; box-shadow: 0 0 50px #000; }
        .copy-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓 ثيم</button>

<div class="container">
    <div class="info">
        <h1>تحدي العيدية 🐍</h1>
        <p>يا هلا بك.. لفي بالثعبان وجمعي 10 نقاط عشان تفتح الأكواد. <br> استعملي الأسهم باليد أو اضغطي على الأزرار البرتقالية تحت!</p>
    </div>

    <div class="game-box">
        <div id="score" style="font-weight: bold; margin-bottom: 10px;">النقاط: 0 / 10</div>
        <canvas id="snakeGame" width="300" height="300"></canvas>
        
        <div class="controls">
            <button class="control-btn btn-up" onclick="changeDir('up')">▲</button>
            <button class="control-btn btn-left" onclick="changeDir('left')">◀</button>
            <button class="control-btn btn-down" onclick="changeDir('down')">▼</button>
            <button class="control-btn btn-right" onclick="changeDir('right')">▶</button>
        </div>
        
        <button id="startBtn" onclick="initGame()" style="margin-top: 20px; padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">ابدأ اللعبة 🎮</button>
    </div>
</div>

<div id="winModal" class="modal">
    <h2 style="color: var(--primary);">كفووو! هذي عيديتك 🎉</h2>
    <p>كود 1: <b id="c1">اضع_الكود_هنا</b> <button class="copy-btn" onclick="copy('c1')">نسخ</button></p>
    <p>كود 2: <b id="c2">اضع_الكود_هنا</b> <button class="copy-btn" onclick="copy('c2')">نسخ</button></p>
    <button onclick="location.reload()" style="margin-top: 15px; border: none; background: #666; color: white; padding: 10px; border-radius: 5px;">إغلاق</button>
</div>

<script>
    const canvas = document.getElementById('snakeGame');
    const ctx = canvas.getContext('2d');
    let grid = 20, snake = [{x:160, y:160}], food = {x:80, y:80}, dx = grid, dy = 0, score = 0, gameLoop;

    function toggleTheme() { document.body.classList.toggle('light-theme'); }

    // هنا تعديل الاتجاهات (اليسار سالب واليمين موجب)
    function changeDir(dir) {
        if(dir==='up' && dy===0) { dx=0; dy=-grid; }
        if(dir==='down' && dy===0) { dx=0; dy=grid; }
        if(dir==='left' && dx===0) { dx=-grid; dy=0; } 
        if(dir==='right' && dx===0) { dx=grid; dy=0; }
    }

    document.addEventListener('keydown', e => {
        if(e.key==='ArrowUp') changeDir('up');
        if(e.key==='ArrowDown') changeDir('down');
        if(e.key==='ArrowLeft') changeDir('left');
        if(e.key==='ArrowRight') changeDir('right');
    });

    function initGame() {
        document.getElementById('startBtn').style.display = 'none';
        score = 0; snake = [{x:160, y:160}]; dx = grid; dy = 0;
        if(gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(main, 150);
    }

    function main() {
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(s => s.x === head.x && s.y === head.y)) {
            alert("حاولي مرة ثانية!"); initGame(); return;
        }
        snake.unshift(head);
        if(head.x === food.x && head.y === food.y) {
            score++; document.getElementById('score').innerText = `النقاط: ${score} / 10`;
            food = {x: Math.floor(Math.random()*14)*grid, y: Math.floor(Math.random()*14)*grid};
            if(score >= 10) { clearInterval(gameLoop); document.getElementById('winModal').style.display='block'; }
        } else { snake.pop(); }
        
        ctx.fillStyle = "black"; ctx.fillRect(0,0,300,300);
        ctx.fillStyle = "#FF7000"; snake.forEach(s => ctx.fillRect(s.x, s.y, grid-2, grid-2));
        ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, grid-2, grid-2);
    }

    function copy(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("تم النسخ! 🎁");
    }
</script>
</body>
</html>
