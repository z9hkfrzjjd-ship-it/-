<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الأناقة</title>
    <style>
        :root { --main-color: #d4af37; --dark-color: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; margin: 0; }
        header { background: var(--dark-color); color: white; padding: 20px; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .product-card { background: white; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 15px; width: 280px; overflow: hidden; transition: 0.3s; }
        .product-card:hover { transform: translateY(-10px); }
        .product-img { width: 100%; height: 200px; background: #eee; display: flex; align-items: center; justify-content: center; color: #888; }
        .product-info { padding: 15px; text-align: center; }
        .price { color: var(--main-color); font-weight: bold; font-size: 1.2em; }
        .btn-buy { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>متجر الأناقة الرقمي</h1><p>أفخم الساعات والنظارات</p></header>
    <div class="container">
        <div class="product-card">
            <div class="product-img">صورة الساعة</div>
            <div class="product-info">
                <h3>ساعة رويال كلاسيك</h3>
                <p class="price">250 ريال</p>
                <button class="btn-buy" onclick="sendWhatsApp('ساعة رويال كلاسيك', '250')">اطلب عبر واتساب</button>
            </div>
        </div>
        <div class="product-card">
            <div class="product-img">صورة النظارة</div>
            <div class="product-info">
                <h3>نظارة شمسية فاخرة</h3>
                <p class="price">180 ريال</p>
                <button class="btn-buy" onclick="sendWhatsApp('نظارة شمسية فاخرة', '180')">اطلب عبر واتساب</button>
            </div>
        </div>
    </div>

    <script>
        function sendWhatsApp(name, price) {
            const phone = "9665XXXXXXXX"; // رقم الزبون هنا
            const msg = `مرحباً، أود طلب: ${name}%0Aالسعر: ${price} ريال`;
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
