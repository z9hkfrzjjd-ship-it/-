<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  عيدية ماما 💕 </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF7000;
            --bg: #111111;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #EEEEEE;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .light-theme {
            --bg: #f5f5f5;
            --card-bg: rgba(0, 0, 0, 0.05);
            --text: #222222;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* زر تغيير الثيم */
        .theme-toggle {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 1000;
            background: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 112, 0, 0.3);
        }

        /* الهيدر والشرح */
        .main-container {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            padding: 10vh 5%;
            align-items: center;
        }

        .info-side {
            flex: 1;
            min-width: 300px;
            padding: 20px;
        }

        .info-side h1 {
            color: var(--primary);
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 2px 2px 20px rgba(255, 112, 0, 0.2);
        }

        .info-side p {
            font-size: 1.4rem;
            line-height: 1.8;
            opacity: 0.9;
        }

        /* منطقة اللعبة */
        .game-side {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .gift-box {
            width: 120px;
            height: 120px;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            cursor: pointer;
            transition: var(--transition);
            animation: float 3s infinite ease-in-out;
        }

        .gift-box:hover {
            transform: scale(1.1) rotate(10deg);
            background: var(--primary);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* المودال (النتائج) */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            border: 3px solid var(--primary);
            padding: 40px;
            border-radius: 30px;
            z-index: 2000;
            text-align: center;
            width: 80%; max-width: 400px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* البحر المتحرك بالأسفل */
        .ocean {
            position: fixed; bottom: 0; width: 100%; height: 5vh;
            background: var(--primary); opacity: 0.2;
        }

    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">تغيير الثيم 🌓</button>

    <div class="main-container">
        <div class="info-side">
            <h1 class="reveal">شرح اللعبة ✨</h1>
            <p class="reveal">
                يا هلا والله.. اعتذار بسيط على اللي صار بالموقع الأول! <br>
                الحين الموضوع صار "تحدي". قدامك 3 صناديق، واحد منها مخبي داخله العيديتين. <br>
                اختاري بقلبك، وإذا طلع صح.. الأكواد لك!
            </p>
        </div>

        <div class="game-side">
            <div class="gift-box" onclick="playGame(1)">🎁</div>
            <div class="gift-box" onclick="playGame(2)" style="animation-delay: 0.5s;">🎁</div>
            <div class="gift-box" onclick="playGame(3)" style="animation-delay: 1s;">🎁</div>
        </div>
    </div>

    <div id="resultModal" class="modal">
        <h2 id="modalTitle">مبروووك! 🎉</h2>
        <div id="giftContent">
            <p>العيدية الأولى: <br> <b id="code1">XXXX-XXXX</b> <button class="copy-btn" onclick="copyCode('code1')">نسخ</button></p>
            <hr>
            <p>العيدية الثانية: <br> <b id="code2">YYYY-YYYY</b> <button class="copy-btn" onclick="copyCode('code2')">نسخ</button></p>
        </div>
        <button class="copy-btn" style="background:#666" onclick="closeModal()">إغلاق</button>
    </div>

    <div class="ocean"></div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        function playGame(boxNum) {
            // اللعبة دائماً تفوز عشان ما نزعلها زيادة ;) 
            const modal = document.getElementById('resultModal');
            modal.style.display = 'block';
            
            // حطي أكوادك هنا
            document.getElementById('code1').innerText = "كود_البلايستيشن_1";
            document.getElementById('code2').innerText = "كود_البلايستيشن_2";
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        function copyCode(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert('تم نسخ الكود بنجاح! 🎮');
        }

        // انيميشن الظهور
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.style.opacity = 1;
            });
        });
        document.querySelectorAll('.reveal').forEach(el => {
            el.style.opacity = 0;
            el.style.transition = "all 1s";
            observer.observe(el);
        });
    </script>
</body>
</html>
