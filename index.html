<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> عيدية مامي 💕  </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF7000;
            --bg: #111111;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #EEEEEE;
        }

        .light-theme {
            --bg: #f5f5f5;
            --card-bg: rgba(0, 0, 0, 0.05);
            --text: #222222;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: 0.5s;
            overflow-x: hidden;
        }

        /* زر تغيير الثيم فوق يسار */
        .theme-toggle {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 1000;
            background: var(--primary);
            border: 4px solid #fff;
            padding: 8px 15px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .main-layout {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            padding: 50px 5%;
            align-items: center;
        }

        /* الشرح على اليمين */
        .sidebar {
            flex: 1;
            min-width: 300px;
            text-align: right;
            padding: 20px;
        }

        .sidebar h1 {
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .sidebar p {
            font-size: 1.2rem;
            line-height: 1.8;
            border-right: 5px solid var(--primary);
            padding-right: 15px;
        }

        /* منطقة اللعبة */
        .game-area {
            flex: 1;
            min-width: 320px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,112,0,0.2);
            text-align: center;
        }

        input {
            width: 80px;
            padding: 15px;
            font-size: 1.5rem;
            border-radius: 15px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--text);
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-play {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Cairo';
            transition: 0.3s;
        }

        .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,112,0,0.4); }

        #message { margin-top: 20px; font-weight: bold; min-height: 30px; }

        /* الأكواد (مخفية) */
        .codes-box {
            display: none;
            margin-top: 30px;
            background: #222;
            padding: 20px;
            border-radius: 20px;
            border: 2px dashed var(--primary);
        }

        .copy-btn {
            background: #444; color: white; border: none; padding: 5px 10px;
            border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-top: 5px;
        }

    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 ثيم</button>

    <div class="main-layout">
        
        <div class="sidebar">
            <h1>شرح اللعبة 🎮</h1>
            <p>
                عشان تاخذين العيدية، لازم تثبتين إنك محظوظة! <br>
                فيه رقم سري "عشوائي" اخترته لك بين 1 و 10. <br>
                خمني الرقم بالخانة اللي جنبك.. <br>
                معاك محاولات لين تجيبينه صح! شدّي حيلك 🚀
            </p>
        </div>

        <div class="game-area">
            <h2 style="margin-bottom: 30px;">خمني الرقم (1-10)</h2>
            <input type="number" id="guessInput" min="1" max="10">
            <br>
            <button class="btn-play" onclick="checkGuess()">تحقق من الرقم 🎯</button>
            <p id="message"></p>

            <div id="codesArea" class="codes-box">
                <h3 style="color: var(--primary);">كفووو! هذي عيديتك 🎉</h3>
                <p>كود 1: <span id="c1">STC-1234-5678</span> <button class="copy-btn" onclick="copy('c1')">نسخ</button></p>
                <p>كود 2: <span id="c2">PSN-9999-0000</span> <button class="copy-btn" onclick="copy('c2')">نسخ</button></p>
            </div>
        </div>

    </div>

    <script>
        // توليد رقم عشوائي عند تحميل الصفحة
        let targetNumber = Math.floor(Math.random() * 10) + 1;
        let attempts = 0;

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        function checkGuess() {
            const userGuess = document.getElementById('guessInput').value;
            const msg = document.getElementById('message');
            const codes = document.getElementById('codesArea');

            if (!userGuess) {
                msg.innerText = "اكتبي رقم أولاً! 😂";
                return;
            }

            attempts++;

            if (parseInt(userGuess) === targetNumber) {
                msg.innerHTML = "صح عليك! جبتيها في " + attempts + " محاولات ✨";
                msg.style.color = "#4CAF50";
                codes.style.display = "block";
                document.querySelector('.btn-play').style.display = "none";
            } else if (userGuess < targetNumber) {
                msg.innerText = "الرقم أكبر من كذا.. جربي مرة ثانية ⬆️";
                msg.style.color = var(--primary);
            } else {
                msg.innerText = "الرقم أصغر من كذا.. جربي مرة ثانية ⬇️";
                msg.style.color = var(--primary);
            }
        }

        function copy(id) {
            const val = document.getElementById(id).innerText;
            navigator.clipboard.writeText(val);
            alert("تم النسخ! 🎁");
        }
    </script>
</body>
</html>
