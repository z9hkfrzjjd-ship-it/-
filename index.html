<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر النجوم | Dark Store</title>
    <style>
        /* الألوان والأساسيات */
        :root {
            --bg-color: #0b0e14; /* خلفية غامقة مريحة */
            --card-bg: #161b22;
            --main-accent: #ffd700; /* لون النجوم والترحيب */
            --text-color: #e6edf3;
            --whatsapp-green: #25d366;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* خلفية النجوم المتحركة */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        /* قسم الترحيب */
        header {
            text-align: center;
            padding: 60px 20px;
            background: rgba(22, 27, 34, 0.8);
            border-bottom: 2px solid var(--main-accent);
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--main-accent);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* حاوية المنتجات - متجاوبة تلقائياً */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* هذا السطر يخلي الموقع يضبط نفسه على الجوال واللابتوب */
            gap: 25px;
            padding: 20px;
        }

        /* كرت المنتج */
        .product-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #30363d;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--main-accent);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #21262d;
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        .product-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
        }

        .price {
            color: var(--main-accent);
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        /* زر الواتساب */
        .btn-whatsapp {
            background-color: var(--whatsapp-green);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
            width: 80%;
            transition: 0.3s;
        }

        .btn-whatsapp:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        /* لمسة الايموجيات في الخلفية */
        .emoji-bg {
            position: absolute;
            font-size: 20px;
            opacity: 0.2;
            user-select: none;
        }

    </style>
</head>
<body>

    <div class="stars-container"></div>

    <header>
        <h1>✨ مرحباً بك في متجر الأناقة ✨</h1>
        <p>تشكيلة فخمة اخترناها لك بعناية تحت ضوء النجوم</p>
    </header>

    <div class="container">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="ساعة" class="product-image">
            <div class="product-info">
                <h3>ساعة ملكية سوداء</h3>
                <span class="price">299 ريال</span>
                <a href="https://wa.me/9665XXXXXXXX?text=أريد طلب الساعة الملكية" class="btn-whatsapp">اطلب عبر واتساب 💬</a>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500" alt="نظارة" class="product-image">
            <div class="product-info">
                <h3>نظارة كلاسيك فخمة</h3>
                <span class="price">150 ريال</span>
                <a href="https://wa.me/9665XXXXXXXX?text=أريد طلب النظارة الكلاسيك" class="btn-whatsapp">اطلب عبر واتساب 💬</a>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" alt="حذاء" class="product-image">
            <div class="product-info">
                <h3>حذاء رياضي الترا</h3>
                <span class="price">420 ريال</span>
                <a href="https://wa.me/9665XXXXXXXX?text=أريد طلب الحذاء الرياضي" class="btn-whatsapp">اطلب عبر واتساب 💬</a>
            </div>
        </div>
    </div>

    <script>
        // حركة بسيطة لإضافة نجوم عشوائية في الخلفية
        const container = document.querySelector('.stars-container');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'emoji-bg';
            star.innerHTML = '⭐';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.fontSize = (Math.random() * 10 + 10) + 'px';
            container.appendChild(star);
        }
    </script>

</body>
</html>
